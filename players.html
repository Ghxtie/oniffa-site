<h1>Online Players</h1>

<p id="list">Loading...</p>

<script>

fetch("https://api.mcsrvstat.us/2/play.oniffa.net")
.then(res => res.json())
.then(data => {

if(data.players.list){
document.getElementById("list").innerText =
data.players.list.join(", ")
}else{
document.getElementById("list").innerText =
"No players online"
}

})

</script>
